<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRanxter.in - Work In Progress</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(180deg,#0f172a,#1e293b);
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:white;
    font-size:4rem;
    letter-spacing:4px;
    animation:pulse 1.5s infinite;
}

p{
    color:#cbd5e1;
    margin-top:15px;
    font-size:1.3rem;
}

.crane{
    position:absolute;
    left:8%;
    bottom:0;
    width:20px;
    height:70vh;
    background:#facc15;
}

.crane-top{
    position:absolute;
    left:20px;
    top:0;
    width:250px;
    height:20px;
    background:#facc15;
}

.cable{
    position:absolute;
    top:20px;
    left:230px;
    width:4px;
    height:180px;
    background:#e2e8f0;
    animation:swing 3s ease-in-out infinite;
    transform-origin:top center;
}

.hook{
    position:absolute;
    bottom:-20px;
    left:-8px;
    width:20px;
    height:20px;
    border:4px solid #f97316;
    border-top:none;
    border-radius:0 0 20px 20px;
}

.road{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#334155;
}

.barrier{
    position:absolute;
    bottom:120px;
    width:100%;
    height:20px;
    background:repeating-linear-gradient(
        45deg,
        #facc15,
        #facc15 20px,
        #111827 20px,
        #111827 40px
    );
}

.light{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#f97316;
    box-shadow:0 0 20px #f97316;
    animation:blink 1s infinite;
}

.l1{top:10%;right:15%;}
.l2{top:25%;right:25%;}
.l3{top:18%;left:25%;}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

@keyframes blink{
    50%{opacity:.2;}
}

@keyframes swing{
    0%{transform:rotate(-10deg);}
    50%{transform:rotate(10deg);}
    100%{transform:rotate(-10deg);}
}
</style>
</head>
<body>

<div class="light l1"></div>
<div class="light l2"></div>
<div class="light l3"></div>

<div class="crane">
    <div class="crane-top"></div>
    <div class="cable">
        <div class="hook"></div>
    </div>
</div>

<div class="container">
    <h1>🚧 WORK IN PROGRESS 🚧</h1>
    <p>PRanxter is building something.</p>
</div>

<div class="barrier"></div>
<div class="road"></div>

</body>
</html>
